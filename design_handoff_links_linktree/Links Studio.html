<style>
  :root {
    --bg:        #0C0B09;
    --bg-side:   #100E0B;
    --surface:   #161410;
    --surface-2: #1E1B16;
    --surface-3: #262219;
    --line:        rgba(245,239,230,0.08);
    --line-strong: rgba(245,239,230,0.15);
    --ink:       #ECE6DA;
    --ink-dim:   #A39C8E;
    --ink-faint: #6E685D;
    --accent:      #F2683C;
    --accent-deep: #D24E22;
    --accent-soft: rgba(242,104,60,0.13);
    --cowork:    #6E63F2;
    --green:     #46B17E;
    --green-soft: rgba(70,177,126,0.13);
    --amber:     #E0A23C;
    --amber-soft: rgba(224,162,60,0.13);
    --red:       #D9614A;
    --r:   14px;
    --r-sm: 9px;
    --shadow: 0 24px 60px -20px rgba(0,0,0,0.6);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  #root { min-height: 100%; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
  .serif { font-family: "Fraunces", Georgia, serif; }
  ::selection { background: var(--accent); color: #1A140C; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(245,239,230,0.12); border-radius: 6px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: rgba(245,239,230,0.2); }
  button { font-family: inherit; cursor: pointer; }
  input, textarea { font-family: inherit; }
  *:focus { outline: none; }
  *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  .eyebrow { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); }
  @keyframes fadeUp { from { transform: translateY(8px); } to { transform: none; } }
  @media (prefers-reduced-motion: reduce) { .fade-up { animation: none !important; } }
  @keyframes slotPulse { 0%,100% { opacity:0.5; } 50% { opacity:0.85; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fade-up { animation: fadeUp 0.4s cubic-bezier(0.2,0.7,0.2,1) both; }
  image-slot.yt-slot:not([data-filled]) { background: transparent; }
  .slot-cap { position: absolute; inset: 0; z-index: 2; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; text-align: center; padding: 12px; color: var(--ink-dim); font-family: "Inter", sans-serif; }
  .slot-cap .cap-main { font-size: 12.5px; font-weight: 600; color: var(--ink); }
  .slot-cap .cap-sub  { font-size: 11px; color: var(--ink-dim); }
  image-slot[data-filled] + .slot-cap { display: none; }
  input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 4px; background: var(--surface-3); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 0 4px var(--accent-soft); }
  @media (max-width: 1080px) {
    [style*="grid-template-columns: 340px 1fr"],
    [style*="grid-template-columns: 1.6fr 1fr"],
    [style*="grid-template-columns: 1.4fr 1fr"] { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 860px) {
    [style*="grid-template-columns: 1fr 1fr 1fr"],
    [style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 760px) { aside { display: none !important; } }
</style>
</head>
