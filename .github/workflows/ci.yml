name: CI

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]

jobs:
  ecosystem-pinning:
    name: Ecosystem Pinning Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check @tn-figueiredo/* packages are pinned (no ^ or ~)
        run: |
          if grep -r '"@tn-figueiredo/' apps/ packages/ --include="package.json" | grep -E '"\^|"~'; then
            echo "❌ Found unpinned @tn-figueiredo/* packages. Use exact versions."
            exit 1
          fi
          echo "✅ All @tn-figueiredo/* packages are pinned."
      - name: Check proprietary LICENSE integrity
        continue-on-error: true  # TODO: remove after Fase 1 rollout applies LICENSE to 32 packages
        run: bash licensing/scripts/check-license.sh

  typecheck:
    name: Typecheck (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    needs: ecosystem-pinning
    strategy:
      matrix:
        workspace: [apps/api, apps/web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Typecheck ${{ matrix.workspace }}
        run: cd ${{ matrix.workspace }} && npx tsc --noEmit

  test-api:
    name: Test — API
    runs-on: ubuntu-latest
    needs: ecosystem-pinning
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm run test:api

  test-web:
    name: Test — Web
    runs-on: ubuntu-latest
    needs: ecosystem-pinning
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm run test:web

  test-db-integration:
    name: Integration (DB-gated)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: supabase/postgres:15.1.0.147
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npx supabase start --exclude gotrue,realtime,storage-api,imgproxy --ignore-health-check
      - run: npx supabase db reset --local
      - run: HAS_LOCAL_DB=1 npm test --workspace=apps/web -- integration/
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm audit --audit-level=high

  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
