<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { min-height: 100vh; min-height: 100dvh; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh; min-height: 100dvh;
    transition: background 0.35s ease, color 0.35s ease;
  }
  ::selection { background: #FF8240; color: #1F1B17; }
  a { -webkit-tap-highlight-color: transparent; }
  a:focus-visible { outline: 2px solid #FF8240; outline-offset: 3px; border-radius: 2px; }

  html[data-theme="dark"],
  html[data-theme="dark"] body,
  html[data-theme="dark"] #root {
    --bg: #14110B; --bg2: #1A1612;
    --paper: #221E18; --paper2: #2A241A; --paper-hover: #312A1E;
    --ink: #EFE6D2; --muted: #958A75; --faint: #6B634F;
    --line: #2E2718; --line2: rgba(255,255,255,0.05);
    --accent: #FF8240; --accent-deep: #E0651E; --yt: #FF3333;
    --tape: rgba(255, 226, 140, 0.38); --tape2: rgba(200, 220, 255, 0.30);
    --shadow: 0 2px 0 rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.03);
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.4);
    color: #EFE6D2;
  }
  html[data-theme="light"],
  html[data-theme="light"] body,
  html[data-theme="light"] #root {
    --bg: #E9E1CE; --bg2: #E0D8C4;
    --paper: #FBF6E8; --paper2: #F5EDD6; --paper-hover: #EFE7D0;
    --ink: #161208; --muted: #6A5F48; --faint: #9C9178;
    --line: #CEBFA0; --line2: rgba(0,0,0,0.04);
    --accent: #C14513; --accent-deep: #9E3710; --yt: #CC0000;
    --tape: rgba(255, 226, 140, 0.70); --tape2: rgba(200, 220, 255, 0.65);
    --shadow: 0 1px 0 rgba(0,0,0,0.04), 0 6px 16px rgba(70,50,20,0.14), inset 0 0 0 1px rgba(0,0,0,0.03);
    --shadow-sm: 0 1px 3px rgba(70,50,20,0.12);
    color: #161208;
  }
  html[data-theme="dark"] { background: #14110B; }
  html[data-theme="light"] { background: #E9E1CE; }
  #root {
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    padding: 0 16px 48px;
    position: relative; z-index: 1;
  }
  html[data-theme="dark"] #root { background: #14110B; color: #EFE6D2; }
  html[data-theme="light"] #root { background: #E9E1CE; color: #161208; }
