<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=820, initial-scale=1">
<title>Facebook Cover — bythiagofigueiredo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500&family=JetBrains+Mono:wght@400;500;600&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0B0907;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }

  .cover {
    width: 820px; height: 312px;
    position: relative; overflow: hidden;
    background: #14110B;
  }

  /* Paper texture grain */
  .cover::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 15% 40%, rgba(199,112,46,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 60%, rgba(255,130,64,0.05) 0%, transparent 45%),
      repeating-linear-gradient(0deg, rgba(242,235,219,0.012) 0 1px, transparent 1px 4px);
    z-index: 1;
  }

  /* Dashed border frame */
  .cover::after {
    content: "";
    position: absolute; inset: 10px;
    border: 1px dashed rgba(242,235,219,0.12);
    z-index: 2;
    pointer-events: none;
  }

  /* Corner brackets */
  .corner {
    position: absolute; width: 16px; height: 16px;
    border: 1.5px solid rgba(242,235,219,0.25);
    z-index: 3;
  }
  .corner.tl { top: 16px; left: 16px;  border-right: 0; border-bottom: 0; }
  .corner.tr { top: 16px; right: 16px; border-left: 0;  border-bottom: 0; }
  .corner.bl { bottom: 16px; left: 16px;  border-right: 0; border-top: 0; }
  .corner.br { bottom: 16px; right: 16px; border-left: 0;  border-top: 0; }

  /* Left section — wordmark + tagline */
  .left {
    position: absolute; left: 48px; top: 0; bottom: 0;
    display: flex; flex-direction: column; justify-content: center;
    z-index: 4;
  }
  .kicker {
    font-family: "Caveat", cursive;
    font-size: 18px; color: #FF8240;
    transform: rotate(-1.5deg);
    margin-bottom: 6px;
    line-height: 1;
  }
  .name-line {
    font-family: "Source Serif 4", Georgia, serif;
    color: #EFE6D2;
    display: flex; align-items: baseline; gap: 10px;
    line-height: 1;
  }
  .name-by {
    font-size: 28px; font-weight: 300; font-style: italic;
    opacity: 0.65;
  }
  .name-full {
    font-size: 42px; font-weight: 500;
    letter-spacing: -0.02em;
  }
  /* Asterisk symbol inline */
  .asterisk {
    display: inline-block; margin-left: 10px;
    position: relative; top: -2px;
  }
  .asterisk svg { width: 18px; height: 18px; }

  .tagline {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: 3.2px;
    color: #EFE6D2; opacity: 0.45;
    text-transform: uppercase;
    margin-top: 14px;
  }

  .bio {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 14px; color: #EFE6D2; opacity: 0.55;
    line-height: 1.45; margin-top: 12px;
    max-width: 380px;
    font-style: italic;
  }

  /* Right section — social handles */
  .right {
    position: absolute; right: 48px; top: 0; bottom: 0;
    display: flex; flex-direction: column; justify-content: center;
    align-items: flex-end;
    gap: 10px;
    z-index: 4;
  }
  .social-row {
    display: flex; align-items: center; gap: 10px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: 0.08em;
    color: #EFE6D2; opacity: 0.7;
  }
  .social-row svg {
    width: 16px; height: 16px;
    opacity: 0.6;
  }
  .social-row .handle { opacity: 1; }

  /* Website URL strip at bottom */
  .url-strip {
    position: absolute; bottom: 22px; left: 0; right: 0;
    z-index: 4;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px; letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #EFE6D2;
  }
  .url-strip .domain { opacity: 0.5; }
  .url-strip .accent { color: #FF8240; opacity: 1; }
  .url-strip .sep { opacity: 0.25; }

  /* Tape decorations */
  .tape {
    position: absolute; z-index: 5;
    height: 16px; width: 72px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .tape-1 {
    top: -4px; left: 180px;
    background: rgba(255,226,140,0.32);
    transform: rotate(-4deg);
  }
  .tape-2 {
    top: -4px; right: 220px;
    background: rgba(209,224,255,0.22);
    transform: rotate(3deg);
  }
  .tape-3 {
    bottom: -4px; left: 380px;
    background: rgba(255,120,120,0.22);
    transform: rotate(-2deg);
  }

  /* Marker highlight on name */
  .highlight {
    position: relative;
    display: inline;
  }
  .highlight::after {
    content: "";
    position: absolute; bottom: 4px; left: -4px; right: -4px;
    height: 12px;
    background: rgba(255,227,122,0.18);
    transform: skew(-2deg);
    z-index: -1;
  }

  /* Vertical separator line */
  .vsep {
    position: absolute; top: 50px; bottom: 50px;
    right: 290px;
    width: 1px;
    border-right: 1px dashed rgba(242,235,219,0.1);
    z-index: 3;
  }
</style>
</head>
<body>

<div class="cover">
  <!-- Corner brackets -->
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>

  <!-- Tape scraps -->
  <div class="tape tape-1"></div>
  <div class="tape tape-2"></div>
  <div class="tape tape-3"></div>

  <!-- Vertical separator -->
  <div class="vsep"></div>

  <!-- Left: name + tagline -->
  <div class="left">
    <div class="kicker">dev, creator, builder —</div>
    <div class="name-line">
      <span class="name-by">by</span>
      <span class="name-full">
        <span class="highlight">Thiago Figueiredo</span>
        <span class="asterisk">

            <path d="M 0 -11 C -1.8 -7, -1.8 7, 0 11 C 1.8 7, 1.8 -7, 0 -11 Z" fill="#FF8240" transform="translate(30 30) rotate(120) scale(1.8)"/>

  </div>

  <!-- Right: social handles -->
  <div class="right">
    <div class="social-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="#EFE6D2" stroke-width="1.8">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="#EFE6D2"/>
      </svg>
      <span class="handle">@thiagonfigueiredo</span>
    </div>
    <div class="social-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="#EFE6D2" stroke-width="1.8">
        <rect x="2" y="4" width="20" height="16" rx="4"/>
        <path d="M10 9l5 3-5 3z" fill="#EFE6D2" stroke="none"/>
      </svg>
      <span class="handle">@bythiagofigueiredo</span>
    </div>
    <div class="social-row">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="#EFE6D2">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
      <span class="handle">@bythiagofig</span>
    </div>
    <div class="social-row">
      <svg viewBox="0 0 24 24" fill="#EFE6D2">
        <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56v-2c-3.2.7-3.88-1.37-3.88-1.37-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.76 2.69 1.25 3.34.96.1-.74.4-1.25.72-1.54-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.28 1.18-3.08-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.18a10.97 10.97 0 015.74 0c2.18-1.49 3.14-1.18 3.14-1.18.63 1.58.23 2.75.12 3.04.74.81 1.18 1.83 1.18 3.08 0 4.42-2.69 5.39-5.26 5.68.42.36.78 1.07.78 2.16v3.21c0 .31.21.68.8.56 4.56-1.52 7.85-5.83 7.85-10.91C23.5 5.65 18.35.5 12 .5z"/>
      </svg>
      <span class="handle">@tnfigueiredo</span>
    </div>
  </div>

  <!-- URL strip -->
  <div class="url-strip">
    <span class="domain">bythiagofigueiredo</span>
    <span class="accent">.com</span>
  </div>
</div>

</body>
</html>
