<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobre — bythiagofigueiredo</title>
<meta name="description" content="Quem é Thiago Figueiredo, o que ele faz, e onde encontrá-lo.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Caveat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    background: #14110B;
  }
  ::selection { background: #FFE37A; color: #1A140C; }
  a { -webkit-tap-highlight-color: transparent; }
  a:focus-visible { outline: 2px solid #FF8240; outline-offset: 3px; border-radius: 2px; }
  .skip { position: absolute; left: -999px; top: 0; z-index: 9999; background: #FF8240; color: #FFF; padding: 10px 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px; text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; }
  .skip:focus { left: 8px; top: 8px; }

  .top-strip { position: fixed; top: 0; left: 0; right: 0; z-index: 999; height: 44px; background: rgba(20,18,16,0.94); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .top-strip .left { display: flex; align-items: center; gap: 14px; color: #F2EBDB; }
  .top-strip .left a { color: inherit; text-decoration: none; opacity: 0.65; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
  .top-strip .left a:hover { opacity: 1; }
  .top-strip .left a[data-current] { opacity: 1; color: #FF8240; }
  .top-strip .left .brand { font-family: 'Fraunces', serif; font-style: italic; font-size: 14px; opacity: 1; letter-spacing: -0.005em; text-transform: none; }
  .top-strip .left .sep { opacity: 0.3; }
  .top-strip .right { display: flex; align-items: center; gap: 8px; }
  .pill { color: #F2EBDB; padding: 3px; border-radius: 999px; display: flex; font-family: 'JetBrains Mono', monospace; font-size: 11px; background: rgba(255,255,255,0.06); }
  .pill button { background: transparent; color: inherit; border: none; padding: 5px 12px; border-radius: 999px; cursor: pointer; font: inherit; letter-spacing: 0.1em; text-transform: uppercase; }
  .pill button.active { background: #F2EBDB; color: #141210; }
  body[data-theme="light"] .top-strip { background: rgba(233,225,206,0.94); border-bottom-color: rgba(0,0,0,0.06); }
  body[data-theme="light"] .top-strip .left { color: #161208; }
  body[data-theme="light"] .top-strip .left a[data-current] { color: #C14513; }
  body[data-theme="light"] .pill { background: rgba(0,0,0,0.06); color: #161208; }
  body[data-theme="light"] .pill button.active { background: #161208; color: #E9E1CE; }

  #root { min-height: 100vh; padding-top: 44px; }

  @media (max-width: 600px) {
    .top-strip .left .sep, .top-strip .left a:not(.brand):not([data-current]) { display: none; }
  }
</style>
</head>
<body data-theme="dark">

<a href="#main" class="skip">Skip to content</a>

<div class="top-strip">
  <div class="left">
    <a href="index.html" class="brand">bythiagofigueiredo</a>
    <span class="sep">·</span>
    <a href="Pinboard.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="videos.html">Videos</a>
    <a href="about.html" data-current>About</a>
    <a href="now.html">Now</a>
  </div>
  <div class="right">
    <div class="pill" id="theme-pill">
      <button data-theme="light">Light</button>
      <button data-theme="dark" class="active">Dark</button>
    </div>
    <div class="pill" id="lang-pill">
      <button data-lang="pt" class="active">PT</button>
      <button data-lang="en">EN</button>
    </div>
  </div>
</div>

<main id="root"></main>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="about-copy.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="about.jsx"></script>

<script>
  /* Tweak defaults — these get merged with whatever the user has saved.
     The Tweaks panel writes back here on disk via __edit_mode_set_keys. */
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "dark",
    "lang": "pt",
    "photoMode": "polaroid",
    "showCTA": true,
    "accent": "",
    "email": "tnfigueiredotv@gmail.com",
    "headline_pt": "eu sou |Thiago.",
    "headline_en": "i'm |Thiago.",
    "tagline_pt": "37 anos, brasileiro, escrevendo daqui de [Toronto] enquanto faço as malas pro próximo capítulo.",
    "tagline_en": "37, Brazilian, writing from [Toronto] while I pack for the next chapter.",
    "ch1_pt": "Antes de qualquer coisa que você vê neste site, passei [um bom tempo] no mundo dos jogos online — uma fase que me ensinou mais sobre disciplina, otimização e tomar decisão sob pressão do que qualquer escola me ensinou.",
    "ch1_en": "Before anything you see on this site, I spent [a good chunk of time] in online gaming — a phase that taught me more about discipline, optimization, and decision-making under pressure than any school ever did.",
    "ch2_pt": "Em agosto de 2017 cruzei o oceano. Levei [oito meses] entre decidir e pousar em Toronto. Fui de [primeiro emprego em loja de eletrônico] a [carreira em desenvolvimento] passando por [cozinha e construção]. Foi onde aprendi que o melhor momento aparece depois — nunca antes.",
    "ch2_en": "In August 2017 I crossed the ocean. It took [eight months] between deciding and landing in Toronto. I went from [first job at an electronics store] to [a career in software] by way of [a kitchen and a construction site]. That's where I learned that the right moment shows up after — never before.",
    "ch3_pt": "Em agosto de 2026 começo de novo: estou indo pra [Ásia]. Por que não. Esse site é o caderno aberto desse próximo capítulo — você acompanha pelo blog, pelos vídeos, ou pelas cartas. Vem junto.",
    "ch3_en": "In August 2026 I start over again: I'm moving to [Asia]. Why not. This site is the open notebook of that next chapter — you can follow along through the blog, the videos, or the newsletters. Come with.",
    "photoCap_pt": "CN Tower, fev/2018",
    "photoCap_en": "CN Tower, Feb 2018",
    "photoDate_pt": "TORONTO · 2018",
    "photoDate_en": "TORONTO · 2018",
    "ctaKicker_pt": "Vem junto",
    "ctaKicker_en": "Come with",
    "signoff_pt": "obrigado por estar aqui — tf",
    "signoff_en": "thanks for being here — tf"
  }/*EDITMODE-END*/;
</script>

<script type="text/babel">
  function loadState() {
    try { const saved = JSON.parse(localStorage.getItem("btf_about") || "{}"); return { ...TWEAK_DEFAULTS, ...saved }; }
    catch { return { ...TWEAK_DEFAULTS }; }
  }

  const App = () => {
    const [tweaks, setTweaks] = useTweaks(loadState());

    // Sync top-strip pills + body theme + lang attr
    React.useEffect(() => {
      document.body.dataset.theme = tweaks.theme;
      document.documentElement.lang = tweaks.lang === "pt" ? "pt-BR" : "en";
      document.querySelectorAll("#theme-pill button").forEach(b => b.classList.toggle("active", b.dataset.theme === tweaks.theme));
      document.querySelectorAll("#lang-pill button").forEach(b => b.classList.toggle("active", b.dataset.lang === tweaks.lang));
    }, [tweaks.theme, tweaks.lang]);

    // Persist a local copy too (for offline / refresh resilience).
    React.useEffect(() => {
      try { localStorage.setItem("btf_about", JSON.stringify(tweaks)); } catch {}
    }, [tweaks]);

    // Wire top-strip pills to setTweak
    React.useEffect(() => {
      const onClick = (e) => {
        const t = e.target.closest("#theme-pill button[data-theme]");
        if (t) return setTweaks({ theme: t.dataset.theme });
        const l = e.target.closest("#lang-pill button[data-lang]");
        if (l) return setTweaks({ lang: l.dataset.lang });
      };
      document.addEventListener("click", onClick);
      return () => document.removeEventListener("click", onClick);
    }, [setTweaks]);

    const L = tweaks.lang;
    const dark = tweaks.theme === "dark";
    const setTweak = (k, v) => {
      if (typeof k === "object") return setTweaks(k);
      setTweaks({ [k]: v });
    };

    return (
      <>
        <window.About tweaks={tweaks} setTweak={setTweak} dark={dark} L={L}/>

        <TweaksPanel title="Tweaks">
          <TweakSection label={L === "pt" ? "Aparência" : "Appearance"}>
            <TweakRadio label={L === "pt" ? "Tema" : "Theme"}
              value={tweaks.theme} onChange={(v) => setTweak("theme", v)}
              options={[{value: "light", label: "Light"}, {value: "dark", label: "Dark"}]}/>
            <TweakRadio label={L === "pt" ? "Idioma" : "Language"}
              value={tweaks.lang} onChange={(v) => setTweak("lang", v)}
              options={[{value: "pt", label: "PT"}, {value: "en", label: "EN"}]}/>
            <TweakRadio label={L === "pt" ? "Foto" : "Photo"}
              value={tweaks.photoMode} onChange={(v) => setTweak("photoMode", v)}
              options={[
                {value: "polaroid", label: L === "pt" ? "Polaroid" : "Polaroid"},
                {value: "round",    label: L === "pt" ? "Avatar"   : "Avatar"},
                {value: "hidden",   label: L === "pt" ? "Sem foto" : "Off"},
              ]}/>
            <TweakColor label={L === "pt" ? "Cor de destaque" : "Accent color"}
              value={tweaks.accent || (dark ? "#FF8240" : "#C14513")}
              onChange={(v) => setTweak("accent", v)}/>
            <TweakToggle label={L === "pt" ? "Bloco \u201CVem junto\u201D" : "\u201CCome with\u201D block"}
              value={tweaks.showCTA !== false}
              onChange={(v) => setTweak("showCTA", v)}/>
          </TweakSection>

          <TweakSection label={L === "pt" ? "Copy — manchete & legenda" : "Copy — headline & caption"}>
            <Hint>{L === "pt"
              ? "Use | na manchete pra marcar onde começa o destaque amarelo."
              : "Use | in the headline to mark where the yellow highlight begins."}</Hint>
            <TweakText label={L === "pt" ? "Manchete" : "Headline"}
              value={tweaks[`headline_${L}`] ?? ""} onChange={(v) => setTweak(`headline_${L}`, v)}/>
            <TweakArea label={L === "pt" ? "Subtítulo" : "Tagline"}
              value={tweaks[`tagline_${L}`] ?? ""} onChange={(v) => setTweak(`tagline_${L}`, v)} rows={3}/>
            <TweakText label={L === "pt" ? "Legenda da foto" : "Photo caption"}
              value={tweaks[`photoCap_${L}`] ?? ""} onChange={(v) => setTweak(`photoCap_${L}`, v)}/>
            <TweakText label={L === "pt" ? "Local · data" : "Place · date"}
              value={tweaks[`photoDate_${L}`] ?? ""} onChange={(v) => setTweak(`photoDate_${L}`, v)}/>
          </TweakSection>

          <TweakSection label={L === "pt" ? "Capítulos" : "Chapters"}>
            <Hint>{L === "pt"
              ? "Três parágrafos curtos. [Texto entre colchetes] são placeholders pra você completar."
              : "Three short paragraphs. [Bracketed text] are placeholders for you to fill in."}</Hint>
            <TweakArea label={L === "pt" ? "1 · Antes" : "1 · Before"}
              value={tweaks[`ch1_${L}`] ?? ""} onChange={(v) => setTweak(`ch1_${L}`, v)} rows={4}/>
            <TweakArea label={L === "pt" ? "2 · Canadá" : "2 · Canada"}
              value={tweaks[`ch2_${L}`] ?? ""} onChange={(v) => setTweak(`ch2_${L}`, v)} rows={4}/>
            <TweakArea label={L === "pt" ? "3 · A seguir" : "3 · What's next"}
              value={tweaks[`ch3_${L}`] ?? ""} onChange={(v) => setTweak(`ch3_${L}`, v)} rows={4}/>
          </TweakSection>

          <TweakSection label={L === "pt" ? "Convite & contato" : "Invite & contact"}>
            <TweakText label={L === "pt" ? "Kicker do bloco" : "Block kicker"}
              value={tweaks[`ctaKicker_${L}`] ?? ""} onChange={(v) => setTweak(`ctaKicker_${L}`, v)}/>
            <TweakText label={L === "pt" ? "Assinatura manuscrita" : "Handwritten sign-off"}
              value={tweaks[`signoff_${L}`] ?? ""} onChange={(v) => setTweak(`signoff_${L}`, v)}/>
            <TweakText label="Email"
              value={tweaks.email ?? ""} onChange={(v) => setTweak("email", v)}/>
          </TweakSection>

          <TweakSection label="Reset">
            <TweakButton secondary label={L === "pt" ? "Restaurar todos os textos" : "Restore all copy"}
              onClick={() => {
                if (!confirm(L === "pt" ? "Restaurar os textos padrão? (tema/idioma não mudam)" : "Restore default copy? (theme/lang stay)")) return;
                const keep = { theme: tweaks.theme, lang: tweaks.lang, photoMode: tweaks.photoMode, showCTA: tweaks.showCTA, accent: tweaks.accent };
                setTweaks({ ...TWEAK_DEFAULTS, ...keep });
              }}/>
          </TweakSection>
        </TweaksPanel>
      </>
    );
  };

  /* Multi-line text control (textarea version of TweakText) */
  function TweakArea({ label, value, onChange, rows = 3 }) {
    return (
      <div className="twk-row" style={{ display: "block" }}>
        <label className="twk-label" style={{ display: "block", marginBottom: 6 }}>{label}</label>
        <textarea
          className="twk-field"
          rows={rows}
          value={value}
          onChange={(e) => onChange(e.target.value)}
          style={{
            width: "100%",
            fontFamily: '"JetBrains Mono", ui-monospace, monospace',
            fontSize: 11, lineHeight: 1.55,
            padding: "8px 10px", resize: "vertical",
            background: "rgba(255,255,255,0.04)",
            color: "inherit", border: "1px solid rgba(255,255,255,0.10)",
            borderRadius: 6, outline: "none",
          }}
        />
      </div>
    );
  }

  function Hint({ children }) {
    return (
      <div style={{
        padding: "8px 10px", margin: "0 0 8px",
        fontSize: 10.5, lineHeight: 1.45, opacity: 0.62,
        fontFamily: '"JetBrains Mono", ui-monospace, monospace',
        borderLeft: "2px solid #FF8240",
      }}>{children}</div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
