<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="light">
  <meta name="supported-color-schemes" content="light">
  <title>{{newsletter_name}} · #{{issue_number}}</title>
  <!--[if mso]>
  <noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
  <![endif]-->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..500;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap');
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; background-color: #F7F1E8; }
    a { color: #FF8240; }
    @media only screen and (max-width: 480px) {
      .email-card { width: 100% !important; }
      .email-body { padding-left: 24px !important; padding-right: 24px !important; }
      .email-h1 { font-size: 26px !important; }
    }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#F7F1E8;">

  <!-- Preheader -->
  <div style="display:none; font-size:1px; line-height:1px; max-height:0; max-width:0; opacity:0; overflow:hidden;">
    {{newsletter_name}} #{{issue_number}} — {{issue_title}}
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F7F1E8;">
    <tr>
      <td align="center" style="padding: 40px 16px;">
        <table role="presentation" class="email-card" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; width:100%; background-color:#FBF6EC; box-shadow: 0 1px 12px rgba(31,27,23,0.07);">

          <!-- ACCENT STRIPE -->
          <tr>
            <td style="height: 4px; background-color: #FF8240; font-size: 1px; line-height: 1px;">&nbsp;</td>
          </tr>

          <!-- HEADER: TF Monogram -->
          <tr>
            <td align="center" style="padding: 40px 48px 12px; font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif; font-size: 44px; font-weight: 500; color: #1F1B17; letter-spacing: -4px; line-height: 1; white-space: nowrap;">
              T<span style="font-style: italic; color: #FF8240;">F</span><span style="font-size: 8px; color: #1F1B17; vertical-align: middle; margin-left: 2px;">&#9679;</span>
            </td>
          </tr>

          <!-- ISSUE META -->
          <tr>
            <td align="center" style="padding: 0 48px 8px;">
              <p style="font-family: 'JetBrains Mono', 'Courier New', Courier, monospace; font-size: 11px; color: #9C9178; letter-spacing: 0.1em; text-transform: uppercase; margin: 0; font-weight: 500;">
                {{newsletter_name}} · #{{issue_number}}
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding: 0 48px 4px;">
              <p style="font-family: 'Inter', Arial, Helvetica, sans-serif; font-size: 12px; color: #9C9178; margin: 0; letter-spacing: 0.02em;">
                {{issue_date}}
              </p>
            </td>
          </tr>

          <!-- DIVIDER -->
          <tr>
            <td class="email-body" style="padding: 16px 48px 0;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr><td style="border-top: 1px solid #E8DCC8; font-size:1px; line-height:1px; height:1px;">&nbsp;</td></tr>
              </table>
            </td>
          </tr>

          <!-- ARTICLE BODY -->
          <tr>
            <td class="email-body" style="padding: 36px 48px 0;">

              <!-- Title -->
              <h1 class="email-h1" style="font-family: 'Fraunces', Georgia, 'Times New Roman', serif; font-size: 32px; font-weight: 500; color: #1F1B17; margin: 0 0 24px; letter-spacing: -0.02em; line-height: 1.25;">
                {{issue_title}}
              </h1>

              <!-- Body paragraphs — replace with actual content -->
              <p style="font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif; font-size: 17px; color: #1F1B17; line-height: 1.7; margin: 0 0 20px;">
                {{body_content}}
              </p>

              <!--
                ═══════════════════════════════════════
                BUILDING BLOCKS — copy and use as needed
                ═══════════════════════════════════════
              -->

              <!-- ▸ DROP CAP (first paragraph only) -->
              <!--
              <p style="font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif; font-size: 17px; color: #1F1B17; line-height: 1.7; margin: 0 0 20px;">
                <span style="font-family: 'Fraunces', Georgia, serif; font-size: 52px; font-weight: 600; color: #FF8240; float: left; line-height: 0.82; margin-right: 8px; margin-top: 4px;">T</span>
                exto começando com drop cap...
              </p>
              -->

              <!-- ▸ SUBHEADING -->
              <!--
              <h2 style="font-family: 'Fraunces', Georgia, 'Times New Roman', serif; font-size: 22px; font-weight: 500; color: #1F1B17; margin: 36px 0 16px; letter-spacing: -0.01em; line-height: 1.3;">
                Subtítulo da seção
              </h2>
              -->

              <!-- ▸ BODY PARAGRAPH -->
              <!--
              <p style="font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif; font-size: 17px; color: #1F1B17; line-height: 1.7; margin: 0 0 20px;">
                Parágrafo de texto corrido.
              </p>
              -->

              <!-- ▸ INLINE LINK -->
              <!--
              <a href="URL" style="color: #FF8240; text-decoration: underline; text-underline-offset: 2px;">texto do link</a>
              -->

              <!-- ▸ PULL QUOTE -->
              <!--
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin: 32px 0;">
                <tr>
                  <td style="border-left: 3px solid #FF8240; padding-left: 20px; padding-top: 4px; padding-bottom: 4px;">
                    <p style="font-family: 'Fraunces', Georgia, 'Times New Roman', serif; font-size: 19px; font-style: italic; color: #1F1B17; line-height: 1.55; margin: 0;">
                      Citação em destaque aqui.
                    </p>
                  </td>
                </tr>
              </table>
              -->

              <!-- ▸ CTA BUTTON -->
              <!--
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" bgcolor="#FF8240" style="background-color: #FF8240; padding: 15px 40px; border-radius: 4px;">
                    <a href="URL" target="_blank" style="color: #1F1B17; font-family: 'Inter', Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 600; text-decoration: none; display: inline-block; letter-spacing: 0.01em;">
                      Texto do Botão
                    </a>
                  </td>
                </tr>
              </table>
              -->

            </td>
          </tr>

          <!-- SIGN-OFF -->
          <tr>
            <td class="email-body" style="padding: 16px 48px 40px;">
              <p style="font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif; font-size: 16px; color: #6A5F48; line-height: 1.6; margin: 0;">
                Até a próxima,<br>
                — Thiago
              </p>
            </td>
          </tr>

          <!-- DIVIDER -->
          <tr>
            <td class="email-body" style="padding: 0 48px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr><td style="border-top: 1px solid #E8DCC8; font-size:1px; line-height:1px; height:1px;">&nbsp;</td></tr>
              </table>
            </td>
          </tr>

          <!-- END MARK -->
          <tr>
            <td align="center" style="padding: 32px 48px 0;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width: 180px;">
                <tr>
                  <td style="border-top: 1px solid #E8DCC8; width: 42%; vertical-align: middle;"></td>
                  <td align="center" style="color: #FF8240; font-family: 'Source Serif 4', Georgia, serif; font-size: 18px; vertical-align: middle; padding: 0 14px; white-space: nowrap; line-height: 1;">&#10086;</td>
                  <td style="border-top: 1px solid #E8DCC8; width: 42%; vertical-align: middle;"></td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td align="center" style="padding: 20px 48px 40px;">
              <p style="font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif; font-size: 14px; color: #6A5F48; margin: 0 0 2px; line-height: 1.4;">
                <span style="font-style: italic; font-weight: 300; opacity: 0.7;">tf</span>
                <span style="color: #FF8240;"> &#10086; </span>
                <span style="font-weight: 500;">Thiago Figueiredo</span>
              </p>
              <p style="font-family: 'Inter', Arial, Helvetica, sans-serif; font-size: 12px; color: #9C9178; margin: 0 0 20px; letter-spacing: 0.02em;">
                bythiagofigueiredo.com
              </p>
              <p style="font-family: 'Inter', Arial, Helvetica, sans-serif; font-size: 11px; color: #9C9178; margin: 0; line-height: 1.6;">
                <a href="{{unsubscribe_url}}" style="color: #9C9178; text-decoration: underline;">Cancelar inscrição</a>
                <span style="padding: 0 6px; opacity: 0.5;">·</span>
                <a href="{{preferences_url}}" style="color: #9C9178; text-decoration: underline;">Preferências</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
