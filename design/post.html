<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post — bythiagofigueiredo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&family=Caveat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: #14110B;
  }
  ::selection { background: #FFE37A; color: #1A140C; }
  a { -webkit-tap-highlight-color: transparent; }
  input { font: inherit; }

  /* Top control strip — lang toggle only */
  .top-strip {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    height: 44px;
    background: rgba(20,18,16,0.94);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    display: flex; align-items: center; justify-content: flex-end;
    padding: 0 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .lang-pill {
    color: #F2EBDB;
    padding: 3px; border-radius: 999px;
    display: flex; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    background: rgba(255,255,255,0.06);
  }
  .lang-pill button {
    background: transparent; color: inherit; border: none;
    padding: 5px 12px; border-radius: 999px; cursor: pointer;
    font: inherit; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .lang-pill button.active { background: #F2EBDB; color: #141210; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; z-index: 998;
    background: rgba(20,18,16,0.94); color: #F2EBDB;
    backdrop-filter: blur(12px); border-radius: 14px;
    padding: 16px 18px; min-width: 240px;
    font-family: 'Inter', sans-serif; font-size: 13px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    display: none;
  }
  .tweaks-panel.visible { display: block; }
  .tweaks-panel {
    max-height: 70vh; overflow-y: auto;
  }
  .tweaks-section-title {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.16em; text-transform: uppercase; opacity: 0.45;
    margin-top: 14px; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .tweaks-row.tweak-sub .label { opacity: 0.7; font-size: 12px; padding-left: 8px; }
  .tweaks-row.tweak-sub { padding: 5px 0; border-top: none !important; }
  .tweaks-panel .tweaks-title {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.6;
    margin-bottom: 14px;
  }
  .tweaks-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0;
  }
  .tweaks-row + .tweaks-row { border-top: 1px solid rgba(255,255,255,0.08); }
  .tweaks-row .label { font-size: 13px; opacity: 0.9; }
  .tweak-seg {
    display: inline-flex; background: rgba(255,255,255,0.08);
    border-radius: 999px; padding: 2px; gap: 2px;
  }
  .tweak-seg button {
    background: transparent; color: inherit; border: none;
    padding: 5px 12px; border-radius: 999px; cursor: pointer;
    font-family: inherit; font-size: 12px;
    transition: background 0.15s, color 0.15s;
  }
  .tweak-seg button.active { background: #F2EBDB; color: #141210; }

  #root { min-height: 100vh; padding-top: 44px; }

  @media (max-width: 760px) {
    .tweaks-panel { right: 10px; bottom: 10px; min-width: 200px; }
  }

  /* Post page: collapse sidebars below 960px */
  @media (max-width: 960px) {
    .post-layout {
      grid-template-columns: minmax(0, 720px) !important;
      gap: 32px !important;
    }
    .post-layout > aside { display: none !important; }
  }

  /* Mobile-only inline ad — surfaces when rails collapse */
  .mobile-only-ad { display: none; }
  @media (max-width: 960px) {
    .mobile-only-ad {
      display: block;
      margin: 36px 0;
    }
  }

  /* Footnote superscripts inside article */
  sup.fn {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62em;
    padding: 0 4px;
    margin: 0 1px;
    cursor: pointer;
    color: #C7702E;
    background: rgba(199,112,46,0.08);
    border-radius: 2px;
    vertical-align: super;
    line-height: 1;
    transition: background 0.15s;
  }
  sup.fn:hover { background: rgba(199,112,46,0.2); }

  /* User highlights */
  mark.btf-hl {
    background: linear-gradient(180deg, transparent 62%, rgba(255, 214, 102, 0.55) 62%, rgba(255, 214, 102, 0.55) 96%, transparent 96%);
    color: inherit;
    padding: 0 1px;
    cursor: pointer;
    transition: background 0.2s;
  }
  mark.btf-hl:hover {
    background: linear-gradient(180deg, rgba(255, 214, 102, 0.2) 0%, rgba(255, 214, 102, 0.7) 60%, rgba(255, 214, 102, 0.7) 100%);
  }

  @keyframes btfFadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes btfSlideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }
  @keyframes btfPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* AI drawer scrollbar */
  .ai-drawer::-webkit-scrollbar { width: 6px; }
  .ai-drawer::-webkit-scrollbar-track { background: transparent; }
  .ai-drawer::-webkit-scrollbar-thumb {
    background: rgba(199,112,46,0.3); border-radius: 3px;
  }

  /* Post layout — responsive 3-col */
  .post-layout {
    grid-template-columns: minmax(0, 1fr) !important;
  }
  .post-layout > aside { display: none; }
  @media (min-width: 1080px) {
    .post-layout {
      grid-template-columns: 200px minmax(0, 720px) 220px !important;
    }
    .post-layout > aside { display: block; }
  }
  @media (min-width: 1440px) {
    .post-layout {
      grid-template-columns: 220px minmax(0, 760px) 260px !important;
    }
  }

  /* Smooth scroll for anchor nav */
  html { scroll-behavior: smooth; }

  /* Accessible focus rings */
  *:focus { outline: none; }
  *:focus-visible {
    outline: 2px solid #C7702E;
    outline-offset: 3px;
    border-radius: 2px;
  }
  button:focus-visible, a:focus-visible {
    outline: 2px solid #C7702E;
    outline-offset: 3px;
  }

  /* Selection styling */
  ::selection {
    background: rgba(255, 214, 102, 0.6);
    color: inherit;
  }

  /* Print styles — clean PDF-friendly layout */
  @media print {
    @page { margin: 1.5cm; }
    body { background: #fff !important; color: #000 !important; }
    /* Hide interactive chrome */
    header, nav, footer,
    [data-sel-toolbar],
    .ai-drawer,
    aside,
    button { display: none !important; }
    /* Hide floating elements */
    [style*="position: fixed"],
    [style*="position:sticky"],
    [style*="position: sticky"] { display: none !important; position: static !important; }
    /* Expand article to full width */
    article, section, main { max-width: 100% !important; }
    /* Reveal footnotes */
    sup.fn {
      background: transparent !important;
      color: #000 !important;
    }
    sup.fn::after {
      content: attr(data-fn);
      font-size: 0.7em;
    }
    /* Show link URLs */
    a[href^="http"]::after {
      content: " (" attr(href) ")";
      font-size: 0.85em;
      color: #666;
      font-family: monospace;
    }
    /* Strip rotations, transforms */
    [style*="rotate"], [style*="transform"] {
      transform: none !important;
    }
    /* Paper: strip the tape + rotations */
    .paper-scrap { transform: none !important; box-shadow: none !important; border: 1px solid #ccc !important; }
    /* Always-on black text */
    h1, h2, h3, h4, p, li, blockquote { color: #000 !important; }
  }
</style>
</head>
<body>

<!-- Top control strip -->
<div class="top-strip">
  <div class="lang-pill">
    <button data-lang="pt" class="active">PT</button>
    <button data-lang="en">EN</button>
  </div>
</div>

<!-- Tweaks panel -->
<div class="tweaks-panel" id="tweaks">
  <div class="tweaks-title">Tweaks</div>
  <div class="tweaks-row">
    <span class="label">Theme</span>
    <div class="tweak-seg" data-tweak="theme">
      <button data-value="light">Light</button>
      <button data-value="dark" class="active">Dark</button>
    </div>
  </div>
  <div class="tweaks-row">
    <span class="label">Language</span>
    <div class="tweak-seg" data-tweak="lang">
      <button data-value="pt" class="active">PT</button>
      <button data-value="en">EN</button>
    </div>
  </div>

  <div class="tweaks-section-title">Ads</div>

  <div class="tweaks-row">
    <span class="label">Show ads</span>
    <div class="tweak-seg" data-tweak="ads">
      <button data-value="true" class="active">On</button>
      <button data-value="false">Off</button>
    </div>
  </div>
  <div class="tweaks-row tweak-sub">
    <span class="label">Marginalia (rail)</span>
    <div class="tweak-seg" data-tweak="ads_marginalia">
      <button data-value="true" class="active">On</button>
      <button data-value="false">Off</button>
    </div>
  </div>
  <div class="tweaks-row tweak-sub">
    <span class="label">Anchor (sidebar)</span>
    <div class="tweak-seg" data-tweak="ads_anchor">
      <button data-value="true" class="active">On</button>
      <button data-value="false">Off</button>
    </div>
  </div>
  <div class="tweaks-row tweak-sub">
    <span class="label">Bookmark (inline)</span>
    <div class="tweak-seg" data-tweak="ads_bookmark">
      <button data-value="true" class="active">On</button>
      <button data-value="false">Off</button>
    </div>
  </div>
  <div class="tweaks-row tweak-sub">
    <span class="label">Coda (after body)</span>
    <div class="tweak-seg" data-tweak="ads_coda">
      <button data-value="true" class="active">On</button>
      <button data-value="false">Off</button>
    </div>
  </div>
  <div class="tweaks-row tweak-sub">
    <span class="label">Bowtie (newsletter)</span>
    <div class="tweak-seg" data-tweak="ads_bowtie">
      <button data-value="true" class="active">On</button>
      <button data-value="false">Off</button>
    </div>
  </div>
  <div class="tweaks-row tweak-sub">
    <span class="label">Doorman (banner)</span>
    <div class="tweak-seg" data-tweak="ads_doorman">
      <button data-value="true">On</button>
      <button data-value="false" class="active">Off</button>
    </div>
  </div>
  <div class="tweaks-row" style="border-top: 1px solid rgba(255,255,255,0.08); padding-top: 12px;">
    <button id="reset-dismissed" style="
      background: transparent; color: #C7702E; border: 1px solid rgba(199,112,46,0.4);
      padding: 7px 12px; border-radius: 4px; cursor: pointer;
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase; width: 100%;
    ">Reset dismissed ads</button>
  </div>
</div>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="content.js?v=5"></script>
<script src="ads-content.js"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="hero-illustrations.jsx"></script>
<script type="text/babel" src="ai-reader.jsx"></script>
<script type="text/babel" src="ads.jsx"></script>
<script type="text/babel" src="post.jsx"></script>

<!-- Tweak defaults -->
<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "lang": "pt",
    "theme": "dark",
    "ads": true,
    "ads_marginalia": true,
    "ads_anchor": true,
    "ads_bookmark": true,
    "ads_coda": true,
    "ads_doorman": true,
    "ads_bowtie": true
  }/*EDITMODE-END*/;
</script>

<script type="text/babel">
  function loadState() {
    try {
      const saved = JSON.parse(localStorage.getItem("btf_post") || "{}");
      return { ...TWEAK_DEFAULTS, ...saved };
    } catch { return { ...TWEAK_DEFAULTS }; }
  }
  function saveState(s) {
    try { localStorage.setItem("btf_post", JSON.stringify(s)); } catch {}
  }

  const App = () => {
    const [state, setState] = React.useState(loadState);

    const update = React.useCallback((patch) => {
      setState(prev => {
        const next = { ...prev, ...patch };
        saveState(next);
        return next;
      });
    }, []);

    React.useEffect(() => {
      document.documentElement.lang = state.lang === "pt" ? "pt-BR" : "en";
      document.querySelectorAll(".lang-pill button").forEach(b => {
        b.classList.toggle("active", b.dataset.lang === state.lang);
      });
      document.querySelectorAll(".tweak-seg").forEach(seg => {
        const key = seg.dataset.tweak;
        seg.querySelectorAll("button").forEach(b => {
          b.classList.toggle("active", b.dataset.value === String(state[key]));
        });
      });
      document.body.style.background = state.theme === "dark" ? "#14110B" : "#E9E1CE";
    }, [state]);

    React.useEffect(() => {
      const onLang = (e) => {
        const b = e.target.closest(".lang-pill button[data-lang]");
        if (b) update({ lang: b.dataset.lang });
      };
      const onTweak = (e) => {
        const b = e.target.closest(".tweak-seg button[data-value]");
        if (!b) return;
        const seg = b.closest(".tweak-seg");
        const key = seg.dataset.tweak;
        let v = b.dataset.value;
        if (v === "true") v = true;
        else if (v === "false") v = false;
        update({ [key]: v });
      };
      const onReset = (e) => {
        const b = e.target.closest("#reset-dismissed");
        if (!b) return;
        try { localStorage.removeItem("btf_ads_dismissed"); } catch {}
        location.reload();
      };
      document.addEventListener("click", onLang);
      document.addEventListener("click", onTweak);
      document.addEventListener("click", onReset);
      return () => {
        document.removeEventListener("click", onLang);
        document.removeEventListener("click", onTweak);
        document.removeEventListener("click", onReset);
      };
    }, [update]);

    React.useEffect(() => {
      const panel = document.getElementById("tweaks");
      const onMsg = (e) => {
        const d = e.data || {};
        if (d.type === "__activate_edit_mode") panel.classList.add("visible");
        else if (d.type === "__deactivate_edit_mode") panel.classList.remove("visible");
      };
      window.addEventListener("message", onMsg);
      try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch {}
      return () => window.removeEventListener("message", onMsg);
    }, []);

    React.useEffect(() => {
      try {
        window.parent.postMessage({
          type: "__edit_mode_set_keys",
          edits: {
            lang: state.lang, theme: state.theme,
            ads: state.ads, ads_marginalia: state.ads_marginalia,
            ads_anchor: state.ads_anchor, ads_bookmark: state.ads_bookmark,
            ads_coda: state.ads_coda, ads_doorman: state.ads_doorman,
            ads_bowtie: state.ads_bowtie,
          },
        }, "*");
      } catch {}
    }, [state.lang, state.theme, state.ads, state.ads_marginalia, state.ads_anchor, state.ads_bookmark, state.ads_coda, state.ads_doorman, state.ads_bowtie]);

    window._lang = state.lang;
    const t = window.CONTENT.ui[state.lang] || window.CONTENT.ui.pt;
    const dark = state.theme === "dark";

    const adsConfig = {
      enabled: state.ads !== false,
      slots: {
        marginalia: state.ads_marginalia !== false,
        anchor: state.ads_anchor !== false,
        bookmark: state.ads_bookmark !== false,
        coda: state.ads_coda !== false,
        bowtie: state.ads_bowtie !== false,
        doorman: state.ads_doorman === true,
      },
    };

    return <window.PostPage t={t} dark={dark} content={window.CONTENT} adsConfig={adsConfig} />;
  };

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
